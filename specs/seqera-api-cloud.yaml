openapi: 3.0.1
info:
  contact:
    email: info@seqera.io
    url: https://seqera.io
  description: Seqera Platform services API
  title: Seqera API
  version: 1.144.0
tags:
  - name: actions
    description: Pipeline actions
  - name: avatars
    description: Avatars
  - name: compute-envs
    description: Compute environments
  - name: credentials
    description: Credentials
  - name: data-links
    description: Cloud storage directory paths in Data Explorer
  - name: datasets
    description: Pipeline input datasets (samplesheets) in CSV or TSV format
  - name: ga4gh
    description: GA4GH workflow execution service runs
  - name: labels
    description: Labels and resource labels
  - name: launch
    description: Workflow launch events
  - name: orgs
    description: Organizations
  - name: pipelines
    description: Pipelines
  - name: pipeline-secrets
    description: Pipeline secrets in a user or workspace context
  - name: platforms
    description: Computing platforms
  - name: service-info
    description: Seqera Platform API service information
  - name: studios
    description: Studios and Studio sessions
  - name: teams
    description: Teams in an organization context
  - name: tokens
    description: API access tokens
  - name: trace
    description: Workflow execution traces
  - name: users
    description: Users
  - name: workflows
    description: Workflow executions
  - name: workspaces
    description: Workspaces in an organization context
paths:
  /actions:
    get:
      operationId: ListActions
      summary: List actions
      description: Lists all available actions in a user context, enriched by `attributes`. Append `?workspaceId` to list actions in a workspace context.
      parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
        - name: attributes
          in: query
          description: 'Additional attribute values to include in the response (`labels`). Returns an empty value (`labels: null`) if omitted.'
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ActionQueryAttribute'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListActionsResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - actions
    post:
      operationId: CreateAction
      summary: Create action
      description: Creates a new pipeline action. Append `?workspaceId` to associate the action with the given workspace.
      parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      requestBody:
        description: Action create request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateActionResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - actions
  /actions/labels/add:
    post:
      operationId: AddLabelsToActions
      summary: Add labels to actions
      description: Adds the given list of labels to the given pipeline actions. Existing labels are preserved.
      parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      requestBody:
        description: Labels add request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssociateActionLabelsRequest'
      responses:
        '204':
          description: OK - No content
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - labels
  /actions/labels/apply:
    post:
      operationId: ApplyLabelsToActions
      summary: Replace action labels
      description: Applies the given list of labels to the given pipeline actions. Existing labels are replaced — include labels to be preserved in `labelIds`.
      parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      requestBody:
        description: Labels apply request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssociateActionLabelsRequest'
      responses:
        '204':
          description: OK - No content
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - labels
  /actions/labels/remove:
    post:
      operationId: RemoveLabelsFromActions
      summary: Remove labels from actions
      description: Removes the given list of labels from the given pipeline actions.
      parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      requestBody:
        description: Labels remove request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssociateActionLabelsRequest'
      responses:
        '204':
          description: OK - No content
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - labels
  /actions/types:
    get:
      operationId: ListActionTypes
      summary: List action event types
      description: Lists the supported event types that trigger a pipeline action. Append `?workspaceId` to list event types in a workspace context.
      parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEventTypesResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - actions
  /actions/validate:
    get:
      operationId: ValidateActionName
      summary: Validate action name
      description: Confirms the validity of the given action name. Append `?name=<your_action_name>`.
      parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
        - name: name
          in: query
          description: Action name to validate
          schema:
            type: string
      responses:
        '204':
          description: OK - No content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
        '409':
          description: Duplicate element
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []
      tags:
        - actions
  /actions/{actionId}:
    delete:
      operationId: DeleteAction
      summary: Delete action
      description: Deletes the pipeline action identified by the given `actionId`.
      parameters:
        - name: actionId
          in: path
          description: Action string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: OK - No content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - actions
    get:
      operationId: DescribeAction
      summary: Describe action
      description: Retrieves the details of the action identified by the given `actionId`.
      parameters:
        - name: actionId
          in: path
          description: Action string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
        - name: attributes
          in: query
          description: 'Additional attribute values to include in the response (`labels`). Returns an empty value (`labels: null`) if omitted.'
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ActionQueryAttribute'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeActionResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - actions
    put:
      operationId: UpdateAction
      summary: Update action
      description: Updates the details of the action identified by the given `actionId`. The `source` of an existing action cannot be changed.
      parameters:
        - name: actionId
          in: path
          description: Action string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      requestBody:
        description: Action update request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateActionRequest'
      responses:
        '204':
          description: OK - No content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - actions
  /actions/{actionId}/launch:
    post:
      operationId: LaunchAction
      summary: Trigger Tower Launch action
      description: Triggers the execution of the Tower Launch action identified by the given `actionId`.
      parameters:
        - name: actionId
          in: path
          description: Action string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      requestBody:
        description: Action launch request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LaunchActionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LaunchActionResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - actions
  /actions/{actionId}/pause:
    post:
      operationId: PauseAction
      summary: Pause or resume action
      description: Pauses or resumes the pipeline action identified by the given `actionId`.
      parameters:
        - name: actionId
          in: path
          description: Action string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmptyBodyRequest'
      responses:
        '204':
          description: OK - No content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - actions
  /avatars:
    post:
      operationId: CreateAvatar
      summary: Create the avatar image
      requestBody:
        description: Image file request
        content:
          multipart/form-data:
            encoding:
              image:
                contentType: application/octet-stream
                explode: false
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAvatarResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - avatars
  /avatars/{avatarId}:
    get:
      operationId: DownloadAvatar
      summary: Download the avatar image
      parameters:
        - name: avatarId
          in: path
          description: Avatar string identifier
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                format: binary
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
        '404':
          description: Not found element
      security:
        - BearerAuth: []
      tags:
        - avatars
  /compute-envs:
    get:
      operationId: ListComputeEnvs
      summary: List compute environments
      description: Lists all available compute environments in a user context. Append `?workspaceId` to list compute environments in a workspace context, and `?status` to filter by compute environment status.
      parameters:
        - name: status
          in: query
          description: Compute environment status
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
        - name: attributes
          in: query
          description: 'Additional attribute values to include in the response (`labels`, `resources`). Returns an empty value (ex. `labels: null`) if omitted.'
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ComputeEnvQueryAttribute'
          explode: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListComputeEnvsResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - compute-envs
    post:
      operationId: CreateComputeEnv
      summary: Create compute environment
      description: Creates a new compute environment. Append `?workspaceId` to create the environment in a workspace context.
      parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      requestBody:
        description: Compute environment create request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateComputeEnvRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateComputeEnvResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - compute-envs
  /compute-envs/validate:
    get:
      operationId: ValidateComputeEnvName
      summary: Validate compute environment name
      description: Confirms the validity of the given compute environment name in a user context. Append `?name=<your_ce_name>`.
      parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
        - name: name
          in: query
          description: Compute environment name to validate
          schema:
            type: string
      responses:
        '204':
          description: OK - No content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
        '409':
          description: Duplicate element
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []
      tags:
        - compute-envs
  /compute-envs/{computeEnvId}:
    delete:
      operationId: DeleteComputeEnv
      summary: Delete compute environment
      description: Deletes the compute environment identified by the given `computeEnvId`. When `force=true`, bypasses active-job checks and SCMS/forge cleanup; only allowed for environments in ERRORED, INVALID, or DELETING status.
      parameters:
        - name: computeEnvId
          in: path
          description: Compute environment string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
        - name: force
          in: query
          description: Force-delete a stuck compute environment, bypassing active-job checks. Only valid for environments in ERRORED, INVALID, or DELETING status.
          schema:
            type: boolean
      responses:
        '204':
          description: OK - No content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
        '409':
          description: Conflicting deletion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []
      tags:
        - compute-envs
    get:
      operationId: DescribeComputeEnv
      summary: Describe compute environment
      description: Retrieves the details of the compute environment identified by the given `computeEnvId`.
      parameters:
        - name: computeEnvId
          in: path
          description: Compute environment string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
        - name: attributes
          in: query
          description: 'Additional attribute values to include in the response (`labels`). Returns an empty value (`labels: null`) if omitted.'
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ComputeEnvQueryAttribute'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeComputeEnvResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - compute-envs
    put:
      operationId: UpdateComputeEnv
      summary: Update compute environment
      description: Updates the details of the compute environment identified by the given `computeEnvId`.
      parameters:
        - name: computeEnvId
          in: path
          description: Compute environment string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      requestBody:
        description: Compute environment update request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateComputeEnvRequest'
      responses:
        '204':
          description: OK - No content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
        '409':
          description: Duplicate element
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []
      tags:
        - compute-envs
  /compute-envs/{computeEnvId}/disable:
    post:
      operationId: DisableComputeEnv
      summary: Disable compute environment
      description: Disables the compute environment identified by the given `computeEnvId`. A disabled compute environment cannot be used to launch workflows. If the compute environment is primary, it will be automatically unset as primary.
      parameters:
        - name: computeEnvId
          in: path
          description: Compute environment string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmptyBodyRequest'
      responses:
        '204':
          description: OK - No content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - compute-envs
  /compute-envs/{computeEnvId}/enable:
    post:
      operationId: EnableComputeEnv
      summary: Enable compute environment
      description: Enables the compute environment identified by the given `computeEnvId`. An enabled compute environment can be used to launch workflows.
      parameters:
        - name: computeEnvId
          in: path
          description: Compute environment string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmptyBodyRequest'
      responses:
        '204':
          description: OK - No content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - compute-envs
  /compute-envs/{computeEnvId}/primary:
    post:
      operationId: UpdateComputeEnvPrimary
      summary: Define primary compute environment
      description: Selects the compute environment identified by the given `computeEnvId` as the primary compute environment in the given workspace context.
      parameters:
        - name: computeEnvId
          in: path
          description: Compute environment string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmptyBodyRequest'
      responses:
        '204':
          description: OK - No content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - compute-envs
  /credentials:
    get:
      operationId: ListCredentials
      summary: List credentials
      description: Lists all available credentials in a user context. Append `?workspaceId` to list credentials in a workspace context, and `?platformId` to filter credentials by computing platform.
      parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
        - name: platformId
          in: query
          description: Platform string identifier
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCredentialsResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - credentials
    post:
      operationId: CreateCredentials
      summary: Create credentials
      description: Creates new credentials in a user context. Append `?workspaceId` to create the credentials in a workspace context. For AWS credentials with IAM Role ARN, append `?useExternalId=true` to generate a Platform-managed External ID.
      parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
        - name: useExternalId
          in: query
          description: Generate External ID for AWS credentials (requires IAM Role ARN)
          schema:
            type: boolean
      requestBody:
        description: Credentials create request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCredentialsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCredentialsResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
      security:
        - BearerAuth: []
      tags:
        - credentials
  /credentials/validate:
    get:
      operationId: ValidateCredentialsName
      summary: Validate credential name
      description: Validates the given credentials name. Append `?name=<your_credential_name>`.
      parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
        - name: name
          in: query
          description: Credentials name to validate
          schema:
            type: string
      responses:
        '204':
          description: OK - No content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Operation not allowed
        '409':
          description: Duplicate element
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - BearerAuth: []
      tags:
        - credentials
  /credentials/{credentialsId}:
    delete:
      operationId: DeleteCredentials
      summary: Delete credentials
      description: Deletes the credentials identified by the given `credentialsId`.
      parameters:
