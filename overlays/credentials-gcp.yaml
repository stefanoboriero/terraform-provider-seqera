overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: GCP Credentials Overlay
  version: 0.0.1
actions:
- target: $.paths
  update:
    /credentials#google:
      post:
        x-speakeasy-entity-operation:
          terraform-datasource: null
          terraform-resource: GoogleCredential#create#1
        x-speakeasy-name-override: CreateGoogleCredentials
        summary: Create Google credentials
        description: Creates new Google credentials in a user context. Append `?workspaceId` to create the credentials in
          a workspace context.
        tags:
        - credentials
        operationId: CreateGoogleCredentials
        parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier where the credentials will be stored
          schema:
            type: integer
            format: int64
        requestBody:
          description: Google credentials create request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateGoogleCredentialsRequest'
          required: true
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CreateGoogleCredentialsResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '409':
            description: Conflict - resource already exists
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
        security:
        - BearerAuth: []
    /credentials/{credentialsId}#google:
      get:
        x-speakeasy-entity-operation:
          terraform-datasource: null
          terraform-resource:
          - GoogleCredential#read
          - GoogleCredential#create#2
        x-speakeasy-name-override: DescribeGoogleCredentials
        summary: Describe Google credentials
        description: Retrieves the details of the Google credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: DescribeGoogleCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/DescribeGoogleCredentialsResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '404':
            description: Not Found - Credential does not exist or has been deleted
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
        security:
        - BearerAuth: []
      put:
        x-speakeasy-entity-operation:
          terraform-datasource: null
          terraform-resource: GoogleCredential#update
        x-speakeasy-name-override: UpdateGoogleCredentials
        summary: Update Google credentials
        description: Updates the details of the Google credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: UpdateGoogleCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
        requestBody:
          description: Google credentials update request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateGoogleCredentialsRequest'
          required: true
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
      delete:
        x-speakeasy-entity-operation:
          terraform-datasource: null
          terraform-resource: GoogleCredential#delete
        x-speakeasy-name-override: DeleteGoogleCredentials
        summary: Delete Google credentials
        description: Deletes the Google credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: DeleteGoogleCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          schema:
            type: integer
            format: int64
        - name: checked
          in: query
          description: If set credentials deletion will be blocked by running jobs that depend on them
          schema:
            type: boolean
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '409':
            description: Running jobs block the deletion of this credentials
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/DeleteCredentialsConflictResponse'
        security:
        - BearerAuth: []
- target: $.components.schemas
  update:
    GoogleCredential:
      required:
      - name
      - keys
      type: object
      properties:
        id:
          x-speakeasy-name-override: credentials_id
          type: string
          description: Unique identifier for the credential (max 22 characters)
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true
        name:
          minLength: 2
          maxLength: 99
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
          description: Display name for the credential. Must be 2-99 characters using only letters, numbers, underscores, and hyphens. No spaces allowed.
          x-speakeasy-param-force-new: true
        provider:
          type: string
          enum:
          - google
          default: google
          description: Cloud provider type (automatically set to "google")
          x-speakeasy-name-override: providerType
          x-speakeasy-param-readonly: true
        deleted:
          type: boolean
          description: Flag indicating if the credential has been soft-deleted
          x-speakeasy-param-readonly: true
          x-speakeasy-param-computed: true
          x-speakeasy-terraform-ignore: true
        lastUsed:
          type: string
          format: date-time
          description: Timestamp when the credential was last used
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        dateCreated:
          type: string
          format: date-time
          description: Timestamp when the credential was created
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp when the credential was last updated
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        keys:
          x-speakeasy-param-readonly: true
          x-speakeasy-entity: GoogleCredential
          x-speakeasy-entity-version: 1
          x-speakeasy-entity-description: |
            Manage Google credentials in Seqera platform using this resource.

            Google credentials authenticate to Google Cloud either with a service account
            key (`data`) or via Workload Identity Federation (`workload_identity_provider`
            and `service_account_email`). WIF is the recommended path — no long-lived key
            is stored in the platform.
          type: object
          properties:
            data:
              type: string
              description: Google Cloud service account key JSON. Required unless workload_identity_provider and service_account_email are provided.
              x-speakeasy-param-sensitive: true
              x-speakeasy-terraform-write-only: true
              x-speakeasy-param-optional: true
              x-speakeasy-plan-validators: GoogleCredentialKeysValidator
              example: "{\n  \"type\": \"service_account\",\n  \"project_id\": \"my-project\",\n  \"private_key_id\": \"key-id\"\
                ,\n  \"private_key\": \"-----BEGIN PRIVATE KEY-----\\n...\\n-----END PRIVATE KEY-----\\n\",\n  \"client_email\"\
                : \"service-account@my-project.iam.gserviceaccount.com\",\n  \"client_id\": \"123456789\",\n  \"auth_uri\"\
                : \"https://accounts.google.com/o/oauth2/auth\",\n  \"token_uri\": \"https://oauth2.googleapis.com/token\"\
                \n}\n"
            workloadIdentityProvider:
              type: string
              pattern: '^projects/[0-9]+/locations/global/workloadIdentityPools/[^/]+/providers/[^/]+$'
              description: 'Full resource path of the GCP workload identity provider that trusts Seqera as an OIDC issuer. Format: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_ID/providers/PROVIDER_ID. Uses the GCP project number, not the project ID. Required (with service_account_email) unless data is provided.'
              example: projects/123456789012/locations/global/workloadIdentityPools/seqera-pool/providers/seqera-provider
              x-speakeasy-param-optional: true
              x-speakeasy-name-override: workload_identity_provider
              x-speakeasy-plan-validators: GoogleCredentialKeysValidator
            serviceAccountEmail:
              type: string
              pattern: '^[^@]+@[^.]+\.iam\.gserviceaccount\.com$'
              description: Email of the GCP service account that Seqera will impersonate via Workload Identity Federation. Required (with workload_identity_provider) unless data is provided.
              example: seqera-runner@my-project.iam.gserviceaccount.com
              x-speakeasy-param-optional: true
              x-speakeasy-name-override: service_account_email
              x-speakeasy-plan-validators: GoogleCredentialKeysValidator
            tokenAudience:
              type: string
              description: OIDC audience claim embedded in the Seqera-issued JWT. Defaults to `//iam.googleapis.com/<workload_identity_provider>`, which matches GCP's allowed-audiences check. Only set when fronting multiple workload identity pools with the same credential.
              x-speakeasy-param-optional: true
              x-speakeasy-name-override: token_audience
    CreateGoogleCredentialsRequest:
      type: object
      required:
      - credentials
      properties:
        credentials:
          $ref: '#/components/schemas/GoogleCredential'
    CreateGoogleCredentialsResponse:
      type: object
      properties:
        credentialsId:
          type: string
    UpdateGoogleCredentialsRequest:
      type: object
      required:
      - credentials
      properties:
        credentials:
          $ref: '#/components/schemas/GoogleCredential'
    DescribeGoogleCredentialsResponse:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/GoogleCredential'
- target: $.components.schemas.GoogleCredential.properties.description
  remove: true
- target: $.components.schemas.GoogleCredential.properties.baseUrl
  remove: true
- target: $.components.schemas.GoogleCredential.properties.category
  remove: true
- target: $["paths"]["/credentials/{credentialsId}#google"]["delete"]["parameters"][?(@.name == "checked")]
  remove: true
- target: $.components.schemas.GoogleCredential.properties.keys.properties.data
  update:
    writeOnly: true
# Add fake keyType field for generation but hide from Terraform schema
- target: $.components.schemas.GoogleCredential.properties.keys.properties
  update:
    keyType:
      type: string
      description: Type of key (always "google") - not exposed in Terraform
      default: google
      x-speakeasy-param-readonly: true
      x-speakeasy-param-computed: true
      x-speakeasy-terraform-ignore: true
- target: $["paths"]["/credentials#google"]["post"]["parameters"][?(@.name == "workspaceId")]
  update:
    x-speakeasy-param-force-new: true
