overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Compute Environment Overlay
  version: 0.0.0
actions:
  # DataStudioComputeEnvDto entity annotation
  - target: $["components"]["schemas"]["DataStudioComputeEnvDto"]
    update:
      x-speakeasy-entity: Studios

  # DescribeComputeEnvResponse entity annotations
  - target: $["components"]["schemas"]["DescribeComputeEnvResponse"]["properties"]["computeEnv"]
    update:
      x-speakeasy-entity: ComputeEnv
  - target: $["components"]["schemas"]["DescribeComputeEnvResponse"]
    update:
      x-speakeasy-entity: ComputeEnv

  # ComputeConfig platform validator
  - target: $["components"]["schemas"]["ComputeEnv_ComputeConfig_"]["properties"]["platform"]
    update:
      x-speakeasy-plan-validators: ComputeConfigValidator
  - target: $["components"]["schemas"]["ComputeEnv_ComputeConfig_"]["properties"]["platform"]
    update:
      x-speakeasy-param-optional: false

  # ConfigEnvVariable validator - ensures at least one of head or compute is true
  - target: $["components"]["schemas"]["ConfigEnvVariable"]
    update:
      x-speakeasy-plan-validators: ConfigEnvVariableValidator
      description: |
        Environment variable configuration. Each variable must specify whether it applies to the head node, compute nodes, or both.
        At least one of 'head' or 'compute' must be set to true. Both can be true to target both head and compute nodes.

  # ConfigEnvVariable field descriptions and defaults
  - target: $["components"]["schemas"]["ConfigEnvVariable"]["properties"]["head"]
    update:
      description: |
        Whether this environment variable should be applied to the head/master node.
        At least one of 'head' or 'compute' must be set to true. Both can be true to target both environments.
        Requires replacement if changed.
      default: false

  - target: $["components"]["schemas"]["ConfigEnvVariable"]["properties"]["compute"]
    update:
      description: |
        Whether this environment variable should be applied to compute/worker nodes.
        At least one of 'head' or 'compute' must be set to true. Both can be true to target both environments.
        Requires replacement if changed.
      default: false

  # ComputeEnv entity operations
  # Note: Update operation now supports in-place name changes
  # Other fields still require replacement
  - target: $.paths["/compute-envs"].post
    update:
      x-speakeasy-entity-operation:

        terraform-datasource: null

        terraform-resource: ComputeEnv#create
  - target: $.paths["/compute-envs/{computeEnvId}"].get
    update:
      x-speakeasy-entity-operation:

        terraform-datasource: null

        terraform-resource: ComputeEnv#read
  - target: $.paths["/compute-envs/{computeEnvId}"].put
    update:
      x-speakeasy-entity-operation:

        terraform-datasource: null

        terraform-resource: ComputeEnv#update
  - target: $.paths["/compute-envs/{computeEnvId}"].delete
    update:
      x-speakeasy-entity-operation:

        terraform-datasource: null

        terraform-resource: ComputeEnv#delete

  # Add retry mechanism for compute environment creation
  # Note: 409 (Conflict) is excluded from retries because it means the resource
  # already exists and retrying won't help. The hook will provide a clear error message.
  - target: $.paths["/compute-envs"].post
    update:
      x-speakeasy-retries:
        strategy: backoff
        backoff:
          initialInterval: 5000 # 5 seconds
          maxInterval: 5000 # 5 seconds (fixed interval)
          maxElapsedTime: 30000 # 30 seconds
          exponent: 1.0 # No exponential backoff, fixed interval
        statusCodes:
          - 429  # Rate limiting - should retry
          - 500  # Internal server error
          - 502  # Bad gateway
          - 503  # Service unavailable
          - 504  # Gateway timeout

  # Mark workspaceId as required for compute-envs GET endpoint to fix import
  - target: $.paths["/compute-envs/{computeEnvId}"].get.parameters[?(@.name == "workspaceId")]
    update:
      name: workspaceId
      in: query
      description: Workspace numeric identifier
      required: true
      schema:
        type: integer
        format: int64

  # ComputeEnvResponseDto annotations
  # Note: Removed x-speakeasy-name-override to use 'id' directly instead of 'computeEnvId'
  - target: $.components.schemas.ComputeEnvResponseDto.properties.dateCreated
    update:
      x-speakeasy-param-readonly: true
  - target: $.components.schemas.ComputeEnvResponseDto.properties.lastUpdated
    update:
      x-speakeasy-param-readonly: true
  - target: $.components.schemas.ComputeEnvResponseDto.properties.lastUsed
    update:
      x-speakeasy-param-readonly: true

  # ComputeEnv_ComputeConfig_ annotations
  # Note: Removed x-speakeasy-name-override to use 'id' directly instead of 'computeEnvId'
  - target: $.components.schemas.ComputeEnv_ComputeConfig_.properties.id
    update:
      x-speakeasy-param-readonly: true
  - target: $.components.schemas.ComputeEnv_ComputeConfig_.properties.dateCreated
    update:
      x-speakeasy-param-readonly: true
  - target: $.components.schemas.ComputeEnv_ComputeConfig_.properties.lastUpdated
    update:
      x-speakeasy-param-readonly: true
  - target: $.components.schemas.ComputeEnv_ComputeConfig_.properties.lastUsed
    update:
      x-speakeasy-param-readonly: true
  - target: $.components.schemas.ComputeEnv_ComputeConfig_.properties.deleted
    update:
      x-speakeasy-param-readonly: true
  - target: $.components.schemas.ComputeEnv_ComputeConfig_.properties.status
    update:
      x-speakeasy-param-readonly: true
  - target: $.components.schemas.ComputeEnv_ComputeConfig_.properties.orgId
    update:
      x-speakeasy-param-readonly: true
  - target: $.components.schemas.ComputeEnv_ComputeConfig_.properties.workspaceId
    update:
      x-speakeasy-param-readonly: true

  # Entity annotations
  - target: $.components.schemas.ComputeEnvResponseDto
    update:
      x-speakeasy-entity: ComputeEnv
      x-speakeasy-entity-version: 1
      x-speakeasy-entity-description: |
        Seqera Platform compute environments define the execution platform where a pipeline will run.
        Compute environments enable users to launch pipelines on a growing number of cloud and
        on-premises platforms. Each compute environment must be configured to enable Seqera to submit tasks.

        Compute environments define the computational resources and configuration needed
        to run Nextflow workflows, including cloud provider settings, resource limits,
        and execution parameters.

  # ============================================================================
  # FORCE REPLACEMENT ON CHANGES
  # ============================================================================
  # Most compute environment fields should trigger replacement when changed
  # Exception: name can be updated in-place

  # NOTE: name field does NOT have force-new - it can be updated in-place
  - target: $.components.schemas.ComputeEnv_ComputeConfig_.properties.description
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.ComputeEnv_ComputeConfig_.properties.platform
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.ComputeEnv_ComputeConfig_.properties.credentialsId
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.ComputeEnv_ComputeConfig_.properties.config
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.ComputeEnv_ComputeConfig_.properties.workspaceId
    update:
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.ComputeEnv_ComputeConfig_
    update:
      x-speakeasy-entity: ComputeEnv
  - target: $.components.schemas.DescribeComputeEnvResponse
    update:
      x-speakeasy-entity: ComputeEnv
  - target: $.components.schemas.CreateComputeEnvResponse
    update:
      x-speakeasy-entity: ComputeEnv

  # Updated overlay annotations
  - target: $["components"]["schemas"]["ComputeEnvResponseDto"]["properties"]["id"]
    update:
      x-speakeasy-name-override: computeEnvId
  - target: $["components"]["schemas"]["ComputeEnvResponseDto"]["properties"]["dateCreated"]
    update:
      x-speakeasy-param-readonly: true
  - target: $["components"]["schemas"]["ComputeEnvResponseDto"]["properties"]["lastUsed"]
    update:
      x-speakeasy-param-readonly: true
  - target: $["components"]["schemas"]["ComputeEnvResponseDto"]
    update:
      x-speakeasy-entity: ComputeEnv
  - target: $["components"]["schemas"]["ComputeEnv_ComputeConfig_"]["properties"]["id"]
    update:
      x-speakeasy-name-override: computeEnvId
  - target: $["components"]["schemas"]["ComputeEnv_ComputeConfig_"]["properties"]["id"]
    update:
      x-speakeasy-param-readonly: true
  - target: $["components"]["schemas"]["ComputeEnv_ComputeConfig_"]["properties"]["platform"]["enum"][*]
    remove: true
  - target: $["components"]["schemas"]["ComputeEnv_ComputeConfig_"]["properties"]["platform"]["enum"]
    update:
      - aws-batch
      - aws-cloud
      - google-lifesciences
      - google-batch
      - google-cloud
      - azure-batch
      - azure-cloud
      - k8s-platform
      - eks-platform
      - gke-platform
      - uge-platform
      - slurm-platform
      - lsf-platform
      - altair-platform
      - moab-platform
      - seqeracompute-platform
  - target: $["components"]["schemas"]["ComputeEnv_ComputeConfig_"]["properties"]["dateCreated"]
    update:
      x-speakeasy-param-readonly: true
  - target: $["components"]["schemas"]["ComputeEnv_ComputeConfig_"]["properties"]["lastUpdated"]
    update:
      x-speakeasy-param-readonly: true
  - target: $["components"]["schemas"]["ComputeEnv_ComputeConfig_"]["properties"]["lastUsed"]
    update:
      x-speakeasy-param-readonly: true
  - target: $["components"]["schemas"]["ComputeEnv_ComputeConfig_"]["properties"]["status"]
    update:
      x-speakeasy-param-readonly: true
  - target: $["components"]["schemas"]["CreateComputeEnvRequest"]
    update:
      x-speakeasy-entity: ComputeEnv
      x-speakeasy-entity-description: |

        This resource allows the management of Seqera compute environments.

        Seqera Platform compute environments define the execution platform where a pipeline will run.
        Compute environments enable users to launch pipelines on a growing number of cloud and on-premises platforms.

        Compute environments define the computational resources and configuration needed
        to run Nextflow workflows, including cloud provider settings, resource limits,
        and execution parameters.
  - target: $["components"]["schemas"]["CreateComputeEnvResponse"]
    update:
      x-speakeasy-entity: ComputeEnv

  # Remove confusing fusionEnabled from ForgeConfig
  # Use enable_fusion at the compute config level instead (e.g., AwsBatchConfig.enable_fusion)
  - target: $.components.schemas.ForgeConfig.properties.fusionEnabled
    remove: true

  # ComputeConfig discriminator and state change handling
  - target: $.components.schemas.ComputeConfig.properties.discriminator
    update:
      x-speakeasy-param-readonly: true
      x-speakeasy-terraform-ignore: true

  # Ignore discriminator fields in all compute config schemas to prevent state changes
  - target: $.components.schemas.AltairPbsComputeConfig.properties.discriminator
    update:
      x-speakeasy-terraform-ignore: true
  - target: $.components.schemas.AwsBatchConfig.properties.discriminator
    update:
      x-speakeasy-terraform-ignore: true
  - target: $.components.schemas.AzBatchConfig.properties.discriminator
    update:
      x-speakeasy-terraform-ignore: true
  - target: $.components.schemas.EksComputeConfig.properties.discriminator
    update:
      x-speakeasy-terraform-ignore: true
  - target: $.components.schemas.GkeComputeConfig.properties.discriminator
    update:
      x-speakeasy-terraform-ignore: true
  - target: $.components.schemas.GoogleBatchConfig.properties.discriminator
    update:
      x-speakeasy-terraform-ignore: true
  - target: $.components.schemas.GoogleLifeSciencesConfig.properties.discriminator
    update:
      x-speakeasy-terraform-ignore: true
  - target: $.components.schemas.K8sComputeConfig.properties.discriminator
    update:
      x-speakeasy-terraform-ignore: true
  - target: $.components.schemas.LsfComputeConfig.properties.discriminator
    update:
      x-speakeasy-terraform-ignore: true
  - target: $.components.schemas.MoabComputeConfig.properties.discriminator
    update:
      x-speakeasy-terraform-ignore: true
  # NOTE: SeqeraComputeConfig.discriminator moved to compute-env-seqeracompute.yaml
  - target: $.components.schemas.SlurmComputeConfig.properties.discriminator
    update:
      x-speakeasy-terraform-ignore: true
  - target: $.components.schemas.UnivaComputeConfig.properties.discriminator
    update:
      x-speakeasy-terraform-ignore: true

  # Add AWS Forge validator to AWS Batch configuration
  - target: $.components.schemas.AwsBatchConfig
    update:
      x-speakeasy-plan-validators: awsForgeValidator

  # Add Azure Batch work directory pattern validation
  # Must be a valid Azure Blob container URL with az:// prefix
  - target: $.components.schemas.AzBatchConfig.properties.workDir
    update:
      title: "Azure Batch Work Directory"
      description: "Must be a valid Azure Blob container URL with format az://container-name/path"
      example: "az://my-container/work"
      pattern: "^az://.+"
      x-speakeasy-param-optional: false
      x-speakeasy-param-force-new: true

  # Add bid percentage constraints and description for AWS Forge configuration
  - target: $.components.schemas.ForgeConfig.properties.bidPercentage
    update:
      title: "Bid Percentage"
      description: |
        The maximum percentage that a Spot Instance price can be when compared with the On-Demand price
        for that instance type before instances are launched. For example, if your maximum percentage is 20%,
        then the Spot price must be less than 20% of the current On-Demand price for that Amazon EC2 instance.
        You always pay the lowest (market) price and never more than your maximum percentage. If you leave this
        field empty, the default value is 100% of the On-Demand price. For most use cases, we recommend leaving
        this field empty.

        Must be a whole number between 0 and 100 (inclusive).
      example: 20
      minimum: 0
      maximum: 100

  # Add wave_enabled validator to ensure fusion2_enabled is explicitly set
  - target: $.components.schemas.AwsBatchConfig.properties.waveEnabled
    update:
      title: "Wave Enabled"
      description: |
        Enable Wave containers for this compute environment. Wave provides container provisioning
        and augmentation capabilities for Nextflow workflows.

        When enable_wave is true, enable_fusion must be explicitly set to either true or false.
        Note: If Fusion2 is enabled, Wave must also be enabled.
      x-speakeasy-plan-validators: WaveEnabledValidator
  - target: $.components.schemas.AwsCloudConfig.properties.waveEnabled
    update:
      title: "Wave Enabled"
      description: |
        Enable Wave containers for this compute environment. Wave provides container provisioning
        and augmentation capabilities for Nextflow workflows.

        When enable_wave is true, enable_fusion must be explicitly set to either true or false.
        Note: If Fusion2 is enabled, Wave must also be enabled.
      x-speakeasy-plan-validators: WaveEnabledValidator
  - target: $.components.schemas.AzBatchConfig.properties.waveEnabled
    update:
      title: "Wave Enabled"
      description: |
        Enable Wave containers for this compute environment. Wave provides container provisioning
        and augmentation capabilities for Nextflow workflows.

        When enable_wave is true, enable_fusion must be explicitly set to either true or false.
        Note: If Fusion2 is enabled, Wave must also be enabled.
      x-speakeasy-plan-validators: WaveEnabledValidator
  - target: $.components.schemas.EksComputeConfig.properties.waveEnabled
    update:
      title: "Wave Enabled"
      description: |
        Enable Wave containers for this compute environment. Wave provides container provisioning
        and augmentation capabilities for Nextflow workflows.

        When enable_wave is true, enable_fusion must be explicitly set to either true or false.
        Note: If Fusion2 is enabled, Wave must also be enabled.
      x-speakeasy-plan-validators: WaveEnabledValidator
  - target: $.components.schemas.GkeComputeConfig.properties.waveEnabled
    update:
      title: "Wave Enabled"
      description: |
        Enable Wave containers for this compute environment. Wave provides container provisioning
        and augmentation capabilities for Nextflow workflows.

        When enable_wave is true, enable_fusion must be explicitly set to either true or false.
        Note: If Fusion2 is enabled, Wave must also be enabled.
      x-speakeasy-plan-validators: WaveEnabledValidator
  - target: $.components.schemas.GoogleBatchConfig.properties.waveEnabled
    update:
      title: "Wave Enabled"
      description: |
        Enable Wave containers for this compute environment. Wave provides container provisioning
        and augmentation capabilities for Nextflow workflows.

        When enable_wave is true, enable_fusion must be explicitly set to either true or false.
        Note: If Fusion2 is enabled, Wave must also be enabled.
      x-speakeasy-plan-validators: WaveEnabledValidator
  # NOTE: SeqeraComputeConfig.waveEnabled moved to compute-env-seqeracompute.yaml

  # ============================================================================
  # FIELD RENAMES - Consistent naming conventions
  # ============================================================================

  # Rename waveEnabled -> enable_wave across all compute configs
  - target: $.components.schemas.AwsBatchConfig.properties.waveEnabled
    update:
      x-speakeasy-name-override: enable_wave
  - target: $.components.schemas.AwsCloudConfig.properties.waveEnabled
    update:
      x-speakeasy-name-override: enable_wave
  - target: $.components.schemas.AzBatchConfig.properties.waveEnabled
    update:
      x-speakeasy-name-override: enable_wave
  - target: $.components.schemas.EksComputeConfig.properties.waveEnabled
    update:
      x-speakeasy-name-override: enable_wave
  - target: $.components.schemas.GkeComputeConfig.properties.waveEnabled
    update:
      x-speakeasy-name-override: enable_wave
  - target: $.components.schemas.GoogleBatchConfig.properties.waveEnabled
    update:
      x-speakeasy-name-override: enable_wave
  # NOTE: SeqeraComputeConfig.waveEnabled name override moved to compute-env-seqeracompute.yaml

  # Rename fusion2Enabled -> enable_fusion across all compute configs
  - target: $.components.schemas.AwsBatchConfig.properties.fusion2Enabled
    update:
      x-speakeasy-name-override: enable_fusion
  - target: $.components.schemas.AwsCloudConfig.properties.fusion2Enabled
    update:
      x-speakeasy-name-override: enable_fusion
  - target: $.components.schemas.AzBatchConfig.properties.fusion2Enabled
    update:
      x-speakeasy-name-override: enable_fusion
  - target: $.components.schemas.EksComputeConfig.properties.fusion2Enabled
    update:
      x-speakeasy-name-override: enable_fusion
  - target: $.components.schemas.GkeComputeConfig.properties.fusion2Enabled
    update:
      x-speakeasy-name-override: enable_fusion
  - target: $.components.schemas.GoogleBatchConfig.properties.fusion2Enabled
    update:
      x-speakeasy-name-override: enable_fusion

  # ============================================================================
  # AWS CLOUD CONFIG FIELD DESCRIPTIONS
  # ============================================================================

  - target: $.components.schemas.AwsCloudConfig.properties.ebsBootSize
    update:
      description: |
        Size of the boot disk (root volume) in GB for EC2 instances in this compute environment.
        When using Fusion v2 without fast instance storage, this defaults to 100 GB with GP3 volume type.
      example: 100
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.AwsCloudConfig.properties.region
    update:
      description: |
        AWS region where the compute environment will be created.
        Examples: us-east-1, eu-west-1, ap-southeast-2
      example: "us-east-1"
      x-speakeasy-param-force-new: true
      x-speakeasy-param-optional: false

  - target: $.components.schemas.AwsCloudConfig.properties.allowBuckets
    update:
      description: |
        List of additional S3 bucket names that compute jobs are allowed to access.
        The work directory bucket is automatically included.
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.AwsCloudConfig.properties.instanceType
    update:
      description: |
        EC2 instance type for the compute environment (e.g., m5.xlarge, c5.2xlarge).
      example: "m5.xlarge"
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.AwsCloudConfig.properties.imageId
    update:
      description: |
        Custom Amazon Machine Image (AMI) ID for compute instances.
        If not specified, the default ECS-optimized AMI is used.
      example: "ami-0123456789abcdef0"
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.AwsCloudConfig.properties.logGroup
    update:
      description: |
        CloudWatch Log group name for pipeline execution logs.
        If specified, logs are sent to this existing log group instead of the default.
      example: "/aws/batch/seqera"
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.AwsCloudConfig.properties.arm64Enabled
    update:
      description: |
        Enable ARM64 (Graviton) CPU architecture for compute instances.
        When enabled, Graviton-based EC2 instances will be selected for cost savings.
      example: false
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.AwsCloudConfig.properties.gpuEnabled
    update:
      description: |
        Enable GPU support for compute instances.
        When enabled, GPU-capable instance types will be selected.
      example: false
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.AwsCloudConfig.properties.ec2KeyPair
    update:
      description: |
        EC2 key pair name for SSH access to compute instances.
        Key pair must exist in the specified region.
      example: "my-keypair"
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.AwsCloudConfig.properties.instanceProfileArn
    update:
      description: |
        IAM instance profile ARN for compute instances.
        Format: arn:aws:iam::account-id:instance-profile/profile-name
      example: "arn:aws:iam::123456789012:instance-profile/BatchInstanceProfile"
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.AwsCloudConfig.properties.subnetId
    update:
      description: |
        Subnet ID where compute instances will be launched.
        Must be in the same VPC and region as the compute environment.
      example: "subnet-12345678"
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.AwsCloudConfig.properties.securityGroups
    update:
      description: |
        List of security group IDs to attach to compute instances.
        Security groups must allow necessary network access.
      example: ["sg-12345678"]
      x-speakeasy-param-force-new: true

  # ============================================================================
  # GOOGLE BATCH CONFIG FIELD DESCRIPTIONS
  # ============================================================================

  - target: $.components.schemas.GoogleBatchConfig.properties.location
    update:
      description: |
        Google Cloud region where pipelines will execute (e.g., us-central1, europe-west1).
      example: "us-central1"
      x-speakeasy-param-force-new: true
      x-speakeasy-param-optional: false

  - target: $.components.schemas.GoogleBatchConfig.properties.spot
    update:
      description: |
        Use Spot (preemptible) VMs for reduced cost. Spot VMs may be reclaimed by
        Google Cloud at any time, so pipelines must be able to handle interruptions.
      example: false
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.bootDiskSizeGb
    update:
      description: |
        Size of the boot (persistent) disk in GB allocated per task and head job VM.
      example: 50
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.cpuPlatform
    update:
      description: |
        Minimum CPU platform for compute instances (e.g., "Intel Cascade Lake").
        See Google Cloud documentation for available CPU platforms per region.
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.machineType
    update:
      description: |
        Google Cloud machine type for compute instances (e.g., n1-standard-4, c2-standard-8).
        Supports patterns like "c2-*" to allow any machine in a family.
      example: "n1-standard-4"
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.projectId
    update:
      description: |
        Google Cloud project ID where compute resources will be created.
      example: "my-gcp-project"
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.sshDaemon
    update:
      description: |
        Enable SSH daemon on compute instances for debugging access.
      example: false
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.sshImage
    update:
      description: |
        Custom container image for the SSH daemon sidecar.
        Only applicable when ssh_daemon is enabled.
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.debugMode
    update:
      description: |
        Debug mode level for the compute environment.
        Set to a non-zero value to enable additional debug logging.
      example: 0
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.copyImage
    update:
      description: |
        Container image used for file staging (copying data to/from Cloud Storage).
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.usePrivateAddress
    update:
      description: |
        Restrict compute instances to private IP addresses only (no public internet access).
        Instances must have access to Google APIs via Private Google Access or a NAT gateway.
      example: false
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.labels
    update:
      description: |
        Key-value map of Google Cloud resource labels applied to compute resources
        for cost tracking and organization.
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.headJobCpus
    update:
      description: |
        Number of CPUs allocated for the Nextflow head job.
      example: 4
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.headJobMemoryMb
    update:
      description: |
        Memory allocation for the Nextflow head job in MB.
      example: 8192
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.nfsTarget
    update:
      description: |
        NFS server hostname or IP address for shared file system access.
        Format: hostname:/export/path
      x-speakeasy-param-force-new: true

  - target: $.components.schemas.GoogleBatchConfig.properties.nfsMount
    update:
      description: |
        Local mount path for the NFS file system on compute instances.
