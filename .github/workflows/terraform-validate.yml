name: Terraform Validate and Plan

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: '1.21'

    - name: Cache Go modules
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build provider
      run: go build -o terraform-provider-seqera

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd #v3.1.2
      with:
        terraform_version: "1.14.4"

    - name: Create .terraformrc with dev overrides
      run: |
        cat > ~/.terraformrc << EOF
        provider_installation {
          dev_overrides {
            "registry.terraform.io/seqeralabs/seqera" = "${{ github.workspace }}"
          }
          direct {}
        }
        EOF

    - name: Terraform Init
      working-directory: ./test/hello-world-tests
      run: terraform init
      continue-on-error: true # We continue on a failure since tf init will fail since its a local provider.\

    - name: Terraform Format Check
      working-directory: ./test/hello-world-tests
      run: terraform fmt -check

    - name: Terraform Validate
      working-directory: ./test/hello-world-tests
      run: terraform validate

    #
    # - name: Create GCP service account key
    #   run: |
    #     cd examples/hello-world-examples
    #     echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > service-account-key.json

    - name: Terraform Plan
      working-directory: ./test/hello-world-tests
      run: terraform plan -no-color -out=plan.tfplan
      env:
        TF_VAR_seqera_server_url: ${{ vars.SEQERA_SERVER_URL || 'https://api.cloud.seqera.io' }}
        TF_VAR_seqera_bearer_auth: ${{ secrets.SEQERA_BEARER_AUTH }}
        TF_VAR_access_key: ${{ secrets.AWS_ACCESS_KEY }}
        TF_VAR_secret_key: ${{ secrets.AWS_SECRET_KEY }}
        TF_VAR_azure_batch_key: ${{ secrets.AZURE_BATCH_KEY }}
        TF_VAR_azure_storage_key: ${{ secrets.AZURE_STORAGE_KEY }}

    - name: Generate Terraform Plan for PR Comment
      if: github.event_name == 'pull_request'
      working-directory: ./test/hello-world-tests
      run: |
        echo "## Terraform Plan:" > plan_output.md
        echo "" >> plan_output.md
        echo "<details>" >> plan_output.md
        echo "<summary>Click to expand terraform plan</summary>" >> plan_output.md
        echo "" >> plan_output.md
        echo "\`\`\`hcl" >> plan_output.md
        terraform show -no-color plan.tfplan >> plan_output.md
        echo "\`\`\`" >> plan_output.md
        echo "" >> plan_output.md
        echo "</details>" >> plan_output.md
        echo "" >> plan_output.md
        echo "Plan generated at: $(date)" >> plan_output.md

    - name: Comment PR with Terraform Plan
      if: github.event_name == 'pull_request'
      uses: mshick/add-pr-comment@b8f338c590a895d50bcbfa6c5859251edc8952fc # v2.8.2
      with:
        message-path: ./test/hello-world-tests/plan_output.md
        message-id: terraform-plan

    # Validate credentials test configurations
    - name: Terraform Init (Credentials)
      working-directory: ./test/credentials
      run: terraform init
      continue-on-error: true # We continue on a failure since tf init will fail since its a local provider.

    - name: Terraform Format Check (Credentials)
      working-directory: ./test/credentials
      run: terraform fmt -check

    - name: Terraform Validate (Credentials)
      working-directory: ./test/credentials
      run: terraform validate
