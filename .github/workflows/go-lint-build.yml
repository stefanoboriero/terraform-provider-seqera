name: Go Lint and Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: '1.24'

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Install golangci
      run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@e9d425110dcd46293652c5981b0a479d091d9f88 #v2.2.2

    - name: Run golangci lint
      run: golangci-lint run

    - name: Build
      run: go build -v ./...

    # - name: Run tests
    #   run: go test -v ./...
